<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field of Reeds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: none;
        }
        
        .sky {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #FF6B35 0%, #FFA500 20%, #FFD700 40%);
            z-index: 1;
        }
        
        .field-container {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #3d8b1a 0%, #2d6b0b 30%, #1a4d00 100%);
            overflow: hidden;
            z-index: 2;
        }
        
        /* Back grass layer (far) - fully opaque */
        .grass-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .grass-blade-back {
            position: absolute;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to top, #0a2800, #1a5500, #2d8b00);
            opacity: 0.6;
        }
        
        /* Creature container - moves within the field */
        #creatureContainer {
            position: fixed;
            width: 80px;
            height: 100px;
            z-index: 15;
        }
        
        #creature {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }
        
        .attacking {
            animation: attackSwing 0.3s ease-in-out;
        }
        
        @keyframes attackSwing {
            0% { transform: scaleX(1) rotate(0deg); }
            50% { transform: scaleX(1.1) rotate(-15deg); }
            100% { transform: scaleX(1) rotate(0deg); }
        }
        
        /* Front grass layer (near) - covers the creature */
        .grass-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }
        
        .grass-blade-front {
            position: absolute;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to top, #0a2800, #1a5500, #2d8b00);
            opacity: 0.85;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 30;
        }
        
        .subtitle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="sky"></div>
    
    <div class="field-container">
        <div class="grass-back" id="grassBack"></div>
        <div class="grass-front" id="grassFront"></div>
    </div>
    
    <div id="creatureContainer">
        <div id="creature"></div>
    </div>
    
    <div class="title">🌾 Field of Reeds 🌾</div>
    <div class="subtitle">Something hunts in the tall grass...</div>
    
    <script>
        const creatureContainer = document.getElementById('creatureContainer');
        const creature = document.getElementById('creature');
        const grassBack = document.getElementById('grassBack');
        const grassFront = document.getElementById('grassFront');
        
        let creatureX = window.innerWidth / 2;
        let creatureY = window.innerHeight * 0.75; // Constrained to field area
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        const speed = 2.5;
        const attackDistance = 80;
        const fieldTop = window.innerHeight * 0.5;
        const fieldBottom = window.innerHeight;
        
        // Generate back grass layer
        function generateBackGrass() {
            grassBack.innerHTML = '';
            for (let i = 0; i < 150; i++) {
                const grass = document.createElement('div');
                grass.className = 'grass-blade-back';
                grass.style.left = Math.random() * 100 + '%';
                grass.style.height = 30 + Math.random() * 80 + 'px';
                grass.style.opacity = 0.3 + Math.random() * 0.4;
                grassBack.appendChild(grass);
            }
        }
        
        // Generate front grass layer (thicker and more opaque to cover creature)
        function generateFrontGrass() {
            grassFront.innerHTML = '';
            for (let i = 0; i < 200; i++) {
                const grass = document.createElement('div');
                grass.className = 'grass-blade-front';
                grass.style.left = Math.random() * 100 + '%';
                grass.style.height = 40 + Math.random() * 100 + 'px';
                grass.style.opacity = 0.6 + Math.random() * 0.35;
                grassFront.appendChild(grass);
            }
        }
        
        generateBackGrass();
        generateFrontGrass();
        
        // Track cursor position
        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });
        
        // Create creature SVG
        function createCreatureSVG(isAttacking = false) {
            return `
                <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Body -->
                    <ellipse cx="40" cy="50" rx="25" ry="35" fill="#FF1744"/>
                    
                    <!-- Head -->
                    <circle cx="40" cy="25" r="18" fill="#FF1744"/>
                    
                    <!-- Eyes white -->
                    <circle cx="33" cy="22" r="6" fill="white"/>
                    <circle cx="47" cy="22" r="6" fill="white"/>
                    
                    <!-- Eyes pupil -->
                    <circle cx="33" cy="23" r="3" fill="black"/>
                    <circle cx="47" cy="23" r="3" fill="black"/>
                    
                    <!-- Glasses frames -->
                    <rect x="26" y="16" width="10" height="10" rx="5" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="44" y="16" width="10" height="10" rx="5" fill="none" stroke="#333" stroke-width="2"/>
                    <line x1="36" y1="21" x2="44" y2="21" stroke="#333" stroke-width="2"/>
                    
                    <!-- Nose -->
                    <line x1="40" y1="25" x2="40" y2="32" stroke="#CC0000" stroke-width="1"/>
                    
                    <!-- Mouth -->
                    <path d="M 35 35 Q 40 38 45 35" stroke="black" stroke-width="1.5" fill="none"/>
                    
                    <!-- Left arm -->
                    <g transform="translate(18, 45)">
                        <rect x="0" y="0" width="8" height="25" rx="4" fill="#E91E63"/>
                        <circle cx="4" cy="28" r="4" fill="#E91E63"/>
                    </g>
                    
                    <!-- Right arm with sickle -->
                    <g transform="translate(54, 45) ${isAttacking ? 'rotate(-30)' : 'rotate(0)'}">
                        <rect x="0" y="0" width="8" height="25" rx="4" fill="#E91E63"/>
                        <circle cx="4" cy="28" r="4" fill="#E91E63"/>
                        <!-- Sickle blade -->
                        <path d="M 2 30 Q 15 25 20 35 Q 18 38 5 32" fill="#DAA520" stroke="#8B7500" stroke-width="1"/>
                        <path d="M 18 33 L 20 35 L 19 38" fill="#DAA520"/>
                    </g>
                    
                    <!-- Left leg -->
                    <rect x="28" y="82" width="7" height="18" rx="3" fill="#FF6B6B"/>
                    <circle cx="31.5" cy="100" r="4" fill="#333"/>
                    
                    <!-- Right leg -->
                    <rect x="45" y="82" width="7" height="18" rx="3" fill="#FF6B6B"/>
                    <circle cx="48.5" cy="100" r="4" fill="#333"/>
                </svg>
            `;
        }
        
        let isAttacking = false;
        let attackCooldown = 0;
        
        // Animation loop
        function animate() {
            // Calculate distance to cursor
            const dx = cursorX - creatureX;
            const dy = Math.max(0, cursorY - creatureY); // Prevent moving above field
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Move towards cursor, but constrained to field area
            if (distance > 5) {
                const angle = Math.atan2(dy, dx);
                creatureX += Math.cos(angle) * speed;
                creatureY += Math.sin(angle) * speed;
            }
            
            // Constrain to field boundaries (can't fly above or below field)
            creatureX = Math.max(0, Math.min(creatureX, window.innerWidth - 80));
            creatureY = Math.max(fieldTop, Math.min(creatureY, fieldBottom - 50));
            
            // Check if should attack
            attackCooldown--;
            if (distance < attackDistance && attackCooldown <= 0) {
                isAttacking = true;
                attackCooldown = 20;
                creature.classList.add('attacking');
                setTimeout(() => {
                    creature.classList.remove('attacking');
                }, 300);
            }
            
            // Update creature position
            creatureContainer.style.left = (creatureX - 40) + 'px';
            creatureContainer.style.top = (creatureY - 50) + 'px';
            
            // Flip based on direction
            if (dx < 0) {
                creature.style.transform = 'scaleX(-1)';
            } else {
                creature.style.transform = 'scaleX(1)';
            }
            
            // Update SVG
            creature.innerHTML = createCreatureSVG(isAttacking);
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
