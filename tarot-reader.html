<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Insights - Tarot Readings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 95%;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 50%, #6c5b7b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 16px;
            color: #b0b0b0;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Questions Phase */
        .questions-phase {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .questions-phase h2 {
            font-size: 28px;
            color: #e0e0e0;
            margin-bottom: 30px;
            text-align: center;
        }

        .question-group {
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out backwards;
        }

        .question-group:nth-child(1) { animation-delay: 0.1s; }
        .question-group:nth-child(2) { animation-delay: 0.2s; }
        .question-group:nth-child(3) { animation-delay: 0.3s; }
        .question-group:nth-child(4) { animation-delay: 0.4s; }

        .question-group label {
            display: block;
            color: #c0c0c0;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .question-group input,
        .question-group textarea,
        .question-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            font-size: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .question-group input::placeholder,
        .question-group textarea::placeholder {
            color: rgba(224, 224, 224, 0.5);
        }

        .question-group input:focus,
        .question-group textarea:focus,
        .question-group select:focus {
            outline: none;
            border-color: rgba(255, 107, 107, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
        }

        .question-group textarea {
            resize: vertical;
            min-height: 80px;
            font-size: 14px;
        }

        .spread-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .spread-option {
            position: relative;
        }

        .spread-option input[type="radio"] {
            display: none;
        }

        .spread-option label {
            display: block;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0;
            color: #c0c0c0;
        }

        .spread-option input[type="radio"]:checked + label {
            border-color: rgba(255, 107, 107, 0.8);
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b9d;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
        }

        .spread-option label:hover {
            border-color: rgba(255, 107, 107, 0.5);
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-family: 'Georgia', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #c0c0c0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Reading Phase */
        .reading-phase {
            display: none;
            animation: fadeIn 0.8s ease-out;
        }

        .reading-title {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .reading-title h2 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cards-container {
            display: grid;
            gap: 30px;
            margin-bottom: 40px;
        }

        .cards-grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .cards-grid-1 {
            grid-template-columns: 1fr;
            max-width: 250px;
            margin: 0 auto;
        }

        .card {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
            animation: cardEntrance 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(50px) rotateX(90deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 48px;
        }

        .card-back::before {
            content: '✦';
            position: absolute;
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-front {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            backface-visibility: hidden;
            transform: rotateY(180deg);
            padding: 20px;
            text-align: center;
            color: #2c3e50;
            overflow: hidden;
        }

        .card-front::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translate(-100%, -100%); }
            100% { transform: translate(100%, 100%); }
        }

        .card-number {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .card-suit {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .card-meaning {
            font-size: 13px;
            color: #34495e;
            line-height: 1.5;
            font-style: italic;
        }

        .card-reversed {
            color: #e74c3c;
            font-weight: bold;
            font-size: 11px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reading-interpretation {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid rgba(255, 107, 107, 0.6);
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            animation: slideIn 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        .reading-interpretation h3 {
            color: #ff6b9d;
            font-size: 18px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reading-interpretation p {
            color: #c0c0c0;
            line-height: 1.8;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .reading-interpretation p:last-child {
            margin-bottom: 0;
        }

        .flip-hint {
            text-align: center;
            color: #8899aa;
            font-size: 14px;
            margin-top: 20px;
            font-style: italic;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .flip-hint.hidden {
            display: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #6c7a88;
            font-size: 13px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer a {
            color: #8899aa;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #aabbcc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }

            .questions-phase {
                padding: 25px;
            }

            .card {
                height: 250px;
            }

            .cards-grid-3 {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        /* Loading animation */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .all-cards-flipped .flip-hint {
            display: none;
        }
    </style>
</head>

        // Utility Functions
        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(cookie.substring(nameEQ.length));
                }
            }
            return null;
        }

        function setCookie(name, value, days = 365) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/";
        }

        function getReadingHistory() {
            const history = getCookie("tarotHistory");
            return history ? JSON.parse(history) : [];
        }

        function saveReadingHistory(reading) {
            const history = getReadingHistory();
            history.push({
                date: new Date().toISOString(),
                name: reading.name,
                question: reading.question,
                area: reading.areaOfLife,
                spread: reading.spread,
                cards: reading.cards
            });
            // Keep only last 20 readings
            if (history.length > 20) {
                history.shift();
            }
            setCookie("tarotHistory", JSON.stringify(history));
        }

        function getRandomCards(count) {
            const shuffled = [...TAROT_DECK].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function isReversed() {
            return Math.random() > 0.5;
        }

        // Generate interpretation based on cards
        function generateInterpretation(cards, question, area) {
            const cardNames = cards.map(c => c.name).join(", ");
            const cardMeanings = cards.map(c => 
                c.reversed ? `${c.name} (reversed): ${c.meaning}` : `${c.name}: ${c.meaning}`
            ).join("\n");

            const interpretations = {
                love: `In matters of the heart, the cards speak of ${cardNames}. These cards suggest that your romantic journey involves ${cards[0].meaning.toLowerCase()}. Pay attention to the energies around trust and communication in your relationships.`,
                career: `Regarding your professional path, ${cardNames} emerge. This indicates ${cards[0].meaning.toLowerCase()}. The cards encourage you to consider new strategies and remain adaptable in your work environment.`,
                finance: `Your financial reading shows ${cardNames}. This suggests ${cards[0].meaning.toLowerCase()}. Be mindful of your resources and look for opportunities to create stability in your financial foundation.`,
                health: `The wellness cards reveal ${cardNames}. This points to ${cards[0].meaning.toLowerCase()}. Remember that true health encompasses mind, body, and spirit. Listen to what your intuition is telling you.`,
                personal: `In your personal growth journey, ${cardNames} appear. They whisper of ${cards[0].meaning.toLowerCase()}. This is a time for reflection and transformation. Trust the process of becoming who you're meant to be.`,
                spirituality: `Your spiritual path illuminates with ${cardNames}. These cards reveal ${cards[0].meaning.toLowerCase()}. The universe is guiding you towards deeper understanding and connection with your higher self.`,
                family: `Regarding family matters, ${cardNames} surface. This speaks to ${cards[0].meaning.toLowerCase()}. Consider the dynamics at play and seek harmony through open communication and compassion.`,
                other: `The cards present ${cardNames}, suggesting ${cards[0].meaning.toLowerCase()}. Let these insights guide your contemplation of the matter at hand.`
            };

            return interpretations[area] || interpretations.other;
        }

        // Form submission
        document.getElementById('readingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                question: document.getElementById('question').value,
                areaOfLife: document.getElementById('areaOfLife').value,
                spread: document.getElementById('spread').value
            };

            // Save to cookies
            setCookie("lastVisitor", formData.name);
            setCookie("lastArea", formData.areaOfLife);

            // Get cards
            const cardCount = parseInt(formData.spread);
            const selectedCards = getRandomCards(cardCount);
            selectedCards.forEach(card => {
                card.reversed = isReversed();
            });

            // Save to history
            formData.cards = selectedCards;
            saveReadingHistory(formData);

            // Display reading
            displayReading(formData, selectedCards);
        });

        function displayReading(formData, cards) {
            document.getElementById('questionsPhase').style.display = 'none';
            document.getElementById('readingPhase').style.display = 'block';

            // Update titles
            const spreadNames = { 1: "Single Card Reading", 3: "Three Card Spread - Past, Present, Future" };
            document.getElementById('readingSpreadName').textContent = spreadNames[formData.spread];
            document.getElementById('readingQuestion').textContent = `"${formData.question}"`;

            // Display cards
            const cardsContainer = document.getElementById('cardsContainer');
            cardsContainer.className = `cards-container cards-grid-${formData.spread}`;
            cardsContainer.innerHTML = '';

            cards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">
                            <span>✦</span>
                        </div>
                        <div class="card-face card-front">
                            <div class="card-number">#${card.number}</div>
                            <div class="card-suit">${card.emoji}</div>
                            <div class="card-name">${card.name}</div>
                            <div class="card-meaning">${card.meaning}</div>
                            ${card.reversed ? '<div class="card-reversed">REVERSED</div>' : ''}
                        </div>
                    </div>
                `;

                cardDiv.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                    checkAllFlipped();
                });

                cardsContainer.appendChild(cardDiv);
            });

            // Generate interpretation
            const interpretation = generateInterpretation(cards, formData.question, formData.areaOfLife);
            document.getElementById('interpretation').innerHTML = `
                <h3>The Message of the Cards</h3>
                <p>${interpretation}</p>
                <p style="margin-top: 15px; color: #aabbcc; font-size: 14px;">Remember, the cards are a reflection of your inner wisdom. Trust your intuition to find the true meaning in these symbols.</p>
            `;

            // Scroll to reading
            setTimeout(() => {
                document.getElementById('readingPhase').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        function checkAllFlipped() {
            const cards = document.querySelectorAll('.card');
            const allFlipped = Array.from(cards).every(card => card.classList.contains('flipped'));
            if (allFlipped) {
                document.getElementById('cardsContainer').classList.add('all-cards-flipped');
            }
        }

        function resetReading() {
            document.getElementById('readingForm').reset();
            document.getElementById('questionsPhase').style.display = 'block';
            document.getElementById('readingPhase').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Load previous visitor name if exists
        window.addEventListener('load', function() {
            const lastVisitor = getCookie("lastVisitor");
            if (lastVisitor) {
                document.getElementById('name').value = lastVisitor;
                const lastArea = getCookie("lastArea");
                if (lastArea) {
                    document.getElementById('areaOfLife').value = lastArea;
                }
            }
        });
    </script>
</body>
</html>
